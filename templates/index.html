<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="
background:black;
color:white;
font-family:Arial;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
">

<img src="{{ url_for('static', filename='mmg.png') }}"
     style="width:200px; margin-top:20px; margin-bottom:30px;">

<form method="POST" style="
display:flex;
flex-direction:column;
width:80%;
max-width:300px;
gap:10px;
">

<label>Nama</label>
<input type="text" name="name">

<label>Email</label>
<input type="email" name="email">

<label>Password</label>
<input type="password" name="password">

<label>Usia</label>
<input type="date" name="usia">

<label>Gender</label>
<div>
  <input type="radio" name="gender" value="male"> Male
  <input type="radio" name="gender" value="female"> Female
</div>

<button id="btn">Lanjut</button>

</form>

<script>
const btn = document.getElementById("btn");
btn.disabled = true;

const textInputs = document.querySelectorAll(
  'input[type="text"], input[type="email"], input[type="password"], input[type="date"]'
);

const radios = document.querySelectorAll('input[name="gender"]');

textInputs.forEach(input => {
  input.addEventListener("input", check);
});

radios.forEach(r => {
  r.addEventListener("change", check);
});

function check() {
  let filled = true;

  textInputs.forEach(i => {
    if (i.value === "") filled = false;
  });

  if (!document.querySelector('input[name="gender"]:checked')) {
    filled = false;
  }

  btn.disabled = !filled;
}
</script>

</body>
</html>
