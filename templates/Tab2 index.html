<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:black;
  color:white;
  font-family:Arial;
  margin:0;
  padding:20px;
}

.cell {
  width:40px;
  height:40px;
  background:#222;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  border-radius:5px;
  transition: transform 0.2s;
}
</style>
</head>

<body>

<audio autoplay loop muted>
  <source src="{{ url_for('static', filename='mmg.mp3') }}">
</audio>

<img src="{{ url_for('static', filename='mmg.png') }}"
     style="position:absolute; left:50%; top:5vh; transform:translateX(-50%); width:200px;">

<div style="
position:absolute;
top:40vh;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
">

<button onclick="openwd()">WITHDRAW | DEPOSIT</button>
<button onclick="openslot()">MOMOGI</button>

</div>

<!-- WD -->
<div id="wd" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center;">
  <div style="background:orange; padding:30px;">
    <span onclick="closewd()">X</span>
    <h2>WITHDRAW | DEPOSIT</h2>
    <p>Hubungi WA: 085788995899</p>
  </div>
</div>

<!-- SLOT -->
<div id="slot" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center;">
  <div style="background:orange; color:black; padding:30px; text-align:center;">

    <span onclick="closeslot()" style="cursor:pointer;">✖</span>

    <h2>MOMOGI</h2>
    <button onclick="spin()">SPIN</button>

    <div id="hasil" style="
    display:grid;
    grid-template-columns: repeat(6, 40px);
    gap:5px;
    justify-content:center;
    margin-top:20px;"></div>

    <p id="result"></p>

  </div>
</div>

<script>
function openwd() {
  document.getElementById("wd").style.display = "flex";
}
function closewd() {
  document.getElementById("wd").style.display = "none";
}

function openslot() {
  document.getElementById("slot").style.display = "flex";
}
function closeslot() {
  document.getElementById("slot").style.display = "none";
}

const symbols = ["🍒","🍋","7️⃣"];
const hasil = document.getElementById("hasil");

for (let i = 0; i < 36; i++) {
  let div = document.createElement("div");
  div.className = "cell";
  div.innerText = "❓";
  hasil.appendChild(div);
}

function rand() {
  return symbols[Math.floor(Math.random()*symbols.length)];
}

function spin() {
  const cells = document.querySelectorAll(".cell");
  let count = 0;

  let interval = setInterval(() => {
    cells.forEach((cell) => {
      let symbol = rand();
      cell.innerText = symbol;
    });

    count++;

    if (count > 15) {
      clearInterval(interval);

      let first = cells[0].innerText;
      let win = true;

      for (let i = 1; i < 6; i++) {
        if (cells[i].innerText !== first) {
          win = false;
          break;
        }
      }

      document.getElementById("result").innerText =
        win ? "JACKPOT 🔥" : "Coba lagi";
    }
  }, 100);
}
</script>

</body>
</html>
