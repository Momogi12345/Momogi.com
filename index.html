<!DOCTYPE HTML>
<html lang="id">
<meta name="viewport" content="width=device-width, initial-scale=5.0, maximum-scale=1.0, user-scalable=no">

<body style="
background:black;
color:white;
font-family:Arial;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
">

<!-- LOGO -->
<img src="{{ url_for('static', filename='mmg.png') }}"
     style="
     width:200px;
     margin-top:20px;
     margin-bottom:30px;
     ">

<!-- FORM -->
<form method="POST" style="
display:flex;
flex-direction:column;
width:80%;
max-width:300px;
gap:10px;
">

    <label>Nama</label>
    <input type="text" name="name">

    <label>Email</label>
    <input type="email" name="email">

    <label>Password</label>
    <input type="password" name="password">

    <label>Usia</label>
    <input type="date" name="date">

    <label>Gender</label>
    <div>
      <input type="radio" name="gender" value="male"> Male
      <input type="radio" name="gender" value="female"> Female
    </div>

    <button id="btn">Lanjut</button>

</form>

</body>

<script>
const btn = document.getElementById("btn");

const textInputs = document.querySelectorAll(
  'input[type="text"], input[type="email"], input[type="password"], input[type="date"]'
);

const radios = document.querySelectorAll('input[name="gender"]');

// pas user ngetik
textInputs.forEach(input => {
  input.addEventListener("input", check);
});

// pas pilih radio
radios.forEach(r => {
  r.addEventListener("change", check);
});

function check() {
  let filled = true;

  // cek input biasa
  textInputs.forEach(i => {
    if (i.value === "") filled = false;
  });

  // cek radio
  if (!document.querySelector('input[name="gender"]:checked')) {
    filled = false;
  }

  btn.disabled = !filled;
}
</script>

</body>
</html>
